name: Release

# Rust desktop-app release pipeline. Builds the self-contained Rust binaries for
# every platform, packages them with the hand-rolled rails in rust/packaging/
# (reusing the store-approved manifests/entitlements/identities), signs, and
# publishes a GitHub Release. The Python library (PyPI) and TypeScript library
# (npm) are still published here from python/ and typescript/.
#
# The Python DESKTOP-APP packaging was retired from this pipeline and preserved,
# runnable on demand, in release-python-desktop-legacy.yml (workflow_dispatch).

on:
  push:
    tags:
      - "v*"

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml
    with:
      skip-build-test: true

  # -- Linux: build + AppImage per arch --------------------------------------
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Install libdbus (keyring Secret Service backend)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Build binaries (release)
        run: cargo build --release --locked -p revenant-sign -p revenant-sign-gui

      - name: Install appimagetool
        # Not hash-pinned (appimagetool ships only a rolling "continuous" tag);
        # harden with a pinned digest when one is published.
        run: |
          curl -fsSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          # GitHub runners lack FUSE; run the AppImage tools by extraction.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          APPIMAGETOOL: /usr/local/bin/appimagetool
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          packaging/linux/build-appimage.sh target/release/revenant-gui dist "$VERSION" "${{ matrix.arch }}"
          cp target/release/revenant "dist/revenant-cli-linux-${{ matrix.arch }}"

      - name: Upload GUI AppImage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-gui-linux-${{ matrix.arch }}
          path: rust/dist/Revenant-${{ matrix.arch }}.AppImage
          if-no-files-found: error

      - name: Upload CLI binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-cli-linux-${{ matrix.arch }}
          path: rust/dist/revenant-cli-linux-${{ matrix.arch }}
          if-no-files-found: error

  # -- Windows: build + Authenticode sign + MSIX -----------------------------
  build-windows:
    name: Build Windows (x64)
    needs: ci
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    env:
      WINDOWS_SIGN: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && 'true' || '' }}

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Build binaries (release)
        run: cargo build --release --locked -p revenant-sign -p revenant-sign-gui

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist/revenant-standalone
          cp target/release/revenant-gui.exe dist/revenant-standalone/
          cp target/release/revenant.exe dist/revenant-standalone/

      - name: Import Windows code-signing certificate
        if: env.WINDOWS_SIGN
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $pfxBytes)
        shell: pwsh

      - name: Sign Windows binaries
        if: env.WINDOWS_SIGN
        env:
          SIGN_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $cert = "$env:RUNNER_TEMP\codesign.pfx"
          $ts = "https://timestamp.digicert.com"
          Get-ChildItem -Path dist\revenant-standalone -Filter *.exe | ForEach-Object {
            Write-Host "Signing $($_.Name)..."
            & signtool sign /f $cert /p $env:SIGN_PASSWORD /tr $ts /td sha256 /fd sha256 `
              /d "Revenant Sign" $_.FullName
            & signtool verify /pa $_.FullName
          }
          Write-Host "Windows binaries signed and verified."
        shell: pwsh

      - name: Clean up Windows certificate
        if: env.WINDOWS_SIGN && always()
        run: |
          $cert = "$env:RUNNER_TEMP\codesign.pfx"
          if (Test-Path $cert) { Remove-Item $cert }
        shell: pwsh

      - name: Zip standalone (Scoop)
        shell: bash
        run: |
          cd dist/revenant-standalone
          7z a ../revenant-windows-x64.zip ./* >/dev/null

      - name: Pack MSIX
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # makeappx.exe lives in the Windows SDK bin; find the newest.
          MAKEAPPX=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name makeappx.exe 2>/dev/null | sort | tail -1)
          MAKEAPPX="$MAKEAPPX" packaging/windows/build-msix.sh \
            dist/revenant-standalone/revenant-gui.exe \
            dist/revenant-standalone/revenant.exe \
            "$VERSION" dist/msix-staging dist/RevenantSign.msix

      - name: Upload standalone zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-standalone-windows-x64
          path: rust/dist/revenant-windows-x64.zip
          if-no-files-found: error

      - name: Upload MSIX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-msix-windows-x64
          path: rust/dist/RevenantSign.msix
          if-no-files-found: error

  # -- macOS: build universal binaries (one runner, both arches + lipo) -------
  build-macos:
    name: Build macOS (universal)
    needs: ci
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Build both arches
        run: |
          cargo build --release --locked --target aarch64-apple-darwin -p revenant-sign -p revenant-sign-gui
          cargo build --release --locked --target x86_64-apple-darwin -p revenant-sign -p revenant-sign-gui

      - name: Lipo universal binaries
        run: |
          mkdir -p dist/universal
          lipo -create \
            target/aarch64-apple-darwin/release/revenant-gui \
            target/x86_64-apple-darwin/release/revenant-gui \
            -output dist/universal/revenant-gui
          lipo -create \
            target/aarch64-apple-darwin/release/revenant \
            target/x86_64-apple-darwin/release/revenant \
            -output dist/universal/revenant

      - name: Upload universal binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: intermediate-macos-universal-bins
          path: rust/dist/universal/*
          if-no-files-found: error

  # -- macOS Developer ID: bundle -> sign -> DMG -> notarize -----------------
  macos-devid:
    name: macOS Developer ID (DMG)
    needs: build-macos
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    env:
      MACOS_SIGN: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' && 'true' || '' }}
      MACOS_NOTARIZE: ${{ secrets.APPSTORE_API_KEY_BASE64 != '' && 'true' || '' }}

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download universal binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intermediate-macos-universal-bins
          path: rust/dist/universal

      - name: Assemble .app
        run: |
          chmod +x dist/universal/revenant-gui dist/universal/revenant
          VERSION="${GITHUB_REF_NAME#v}"
          packaging/macos/bundle-app.sh dist/universal/revenant-gui dist "$VERSION" "${{ github.run_number }}"
          cp dist/universal/revenant dist/revenant

      - name: Import Developer ID certificate
        if: env.MACOS_SIGN
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Codesign (Developer ID)
        if: env.MACOS_SIGN
        run: |
          IDENTITY="Developer ID Application: ${{ secrets.APPLE_IDENTITY }}"
          ENT=packaging/macos/entitlements.plist
          # Self-contained bundle: sign the inner executable, then the bundle.
          codesign --force --timestamp --options runtime --entitlements "$ENT" \
            --sign "$IDENTITY" "dist/Revenant.app/Contents/MacOS/revenant-gui"
          codesign --force --timestamp --options runtime --entitlements "$ENT" \
            --sign "$IDENTITY" "dist/Revenant.app"
          codesign --force --timestamp --options runtime --entitlements "$ENT" \
            --sign "$IDENTITY" "dist/revenant"
          codesign --verify --deep --strict "dist/Revenant.app"
          codesign --verify --strict "dist/revenant"

      - name: Create + sign DMG
        run: |
          packaging/macos/make-dmg.sh dist/Revenant.app dist/Revenant.dmg
          if [ -n "${MACOS_SIGN:-}" ]; then
            codesign --force --timestamp \
              --sign "Developer ID Application: ${{ secrets.APPLE_IDENTITY }}" dist/Revenant.dmg
            codesign --verify --strict dist/Revenant.dmg
          fi

      - name: Decode notarization key
        if: env.MACOS_NOTARIZE
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Notarize + staple DMG
        if: env.MACOS_NOTARIZE
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit dist/Revenant.dmg \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" --wait
          xcrun stapler staple dist/Revenant.dmg

      - name: Notarize CLI
        if: env.MACOS_NOTARIZE
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          ditto -c -k --keepParent dist/revenant dist/revenant-cli.zip
          xcrun notarytool submit dist/revenant-cli.zip \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" --wait
          rm dist/revenant-cli.zip

      - name: Clean up signing keys
        if: env.MACOS_NOTARIZE && always()
        run: rm -rf ~/private_keys

      - name: Rename artifacts
        run: |
          cd dist
          mv revenant revenant-cli-macos-universal
          mv Revenant.dmg Revenant-gui-macos-universal.dmg

      - name: Upload GUI DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-gui-macos-universal
          path: rust/dist/Revenant-gui-macos-universal.dmg
          if-no-files-found: error

      - name: Upload CLI
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-cli-macos-universal
          path: rust/dist/revenant-cli-macos-universal
          if-no-files-found: error

  # -- macOS App Store: bundle -> MAS sign -> productbuild .pkg ---------------
  macos-mas:
    name: macOS App Store (pkg)
    needs: build-macos
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    env:
      MAS_SIGN: ${{ secrets.MAS_CERTIFICATE_BASE64 != '' && 'true' || '' }}

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Download universal binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intermediate-macos-universal-bins
          path: rust/dist/universal

      - name: Assemble .app
        run: |
          chmod +x dist/universal/revenant-gui
          VERSION="${GITHUB_REF_NAME#v}"
          packaging/macos/bundle-app.sh dist/universal/revenant-gui dist "$VERSION" "${{ github.run_number }}"

      - name: Import MAS certificate
        if: env.MAS_SIGN
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MAS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MAS_CERTIFICATE_PASSWORD }}

      - name: Codesign (MAS) + embed provisioning profile
        if: env.MAS_SIGN
        run: |
          echo "${{ secrets.MAS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
            > dist/Revenant.app/Contents/embedded.provisionprofile
          IDENTITY="3rd Party Mac Developer Application: ${{ secrets.APPLE_IDENTITY }}"
          ENT=packaging/macos/entitlements-sandbox.plist
          codesign --force --timestamp --options runtime --entitlements "$ENT" \
            --sign "$IDENTITY" "dist/Revenant.app/Contents/MacOS/revenant-gui"
          codesign --force --timestamp --options runtime --entitlements "$ENT" \
            --sign "$IDENTITY" "dist/Revenant.app"
          codesign --verify --deep --strict "dist/Revenant.app"

      - name: Build MAS .pkg
        if: env.MAS_SIGN
        run: |
          productbuild --component "dist/Revenant.app" /Applications \
            --sign "3rd Party Mac Developer Installer: ${{ secrets.APPLE_IDENTITY }}" \
            dist/Revenant-MAS.pkg

      - name: Upload MAS pkg
        if: env.MAS_SIGN
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-mas-macos-universal
          path: rust/dist/Revenant-MAS.pkg
          if-no-files-found: error

  # -- Collect artifacts, checksum, attest, SBOM, GitHub Release --------------
  release:
    name: Create Release
    needs: [build-linux, build-windows, macos-devid, macos-mas]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "release-*"
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "artifacts/*"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: rust/
          format: spdx-json
          output-file: artifacts/revenant-sbom.spdx.json

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -- Library publishing (unchanged; separate products) ---------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: release
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(echo "$TAG" | sed -E 's/-alpha\./a/; s/-beta\./b/; s/-rc\./rc/')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r .github/requirements/build.txt

      - name: Build sdist and wheel
        run: python -m build python/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: python/dist/
          attestations: true

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r .github/requirements/build.txt

      - name: Build sdist and wheel
        run: python -m build python/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: python/dist/
          attestations: true
          skip-existing: true

  publish-npm:
    name: Publish to npm
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Trusted publishing (OIDC) needs npm CLI >= 11.5.1; Node 22 ships an older
      # npm, and pnpm's OIDC path is currently broken (publishes 404). So publish
      # with the npm CLI directly -- auth comes from the id-token, no NODE_AUTH_TOKEN.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: |
          PKG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "revenant-sign@$PKG_VERSION" version 2>/dev/null; then
            echo "Version $PKG_VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi

  publish-npm-prerelease:
    name: Publish to npm (pre-release)
    needs: release
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # See the stable publish job: OIDC trusted publishing via the npm CLI.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --provenance --access public --tag next

  # -- crates.io: publish the Rust library + CLI crates via OIDC --------------
  # Tokenless trusted publishing, same model as npm/PyPI: crates-io-auth-action
  # exchanges the workflow's OIDC id-token for a short-lived, auto-revoked
  # registry token. Requires a Trusted Publisher configured on crates.io for
  # EACH crate (repo lobotomoe/revenant, workflow release.yml, environment
  # crates-io). The GUI crate is publish=false and is skipped. Stable tags only.
  publish-crates:
    name: Publish to crates.io
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      # revenant-sign-core builds keyring (Secret Service) during publish verify.
      - name: Install libdbus
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Authenticate to crates.io (OIDC trusted publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      # Publish in dependency order (tls -> core -> cli). `cargo publish` waits
      # for each crate to appear on the index before returning, so the next one
      # resolves it. Each publish is guarded so a re-run after a partial failure
      # skips crates that already landed.
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          publish_crate() {
            local crate="$1" ver
            ver=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg c "$crate" '.packages[] | select(.name==$c) | .version')
            if curl -sf -H 'User-Agent: revenant-release (https://github.com/lobotomoe/revenant)' \
                 "https://crates.io/api/v1/crates/$crate/$ver" >/dev/null; then
              echo "$crate@$ver already published, skipping"
            else
              echo "Publishing $crate@$ver..."
              cargo publish -p "$crate"
            fi
          }
          publish_crate revenant-sign-tls
          publish_crate revenant-sign-core
          publish_crate revenant-sign
