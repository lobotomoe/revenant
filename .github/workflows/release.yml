name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml
    with:
      skip-build-test: true

  build:
    name: Build (${{ matrix.os }})
    needs: ci
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            cli_artifact: revenant
            gui_artifact: Revenant.dmg
          - os: macos-15-intel
            platform: macos-x64
            cli_artifact: revenant
            gui_artifact: Revenant.dmg
          - os: ubuntu-latest
            platform: linux-x64
            cli_artifact: revenant
            gui_artifact: Revenant-x86_64.AppImage
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            cli_artifact: revenant
            gui_artifact: Revenant-aarch64.AppImage
          - os: windows-latest
            platform: windows-x64
            cli_artifact: revenant.exe
            gui_artifact: revenant-gui.exe
            standalone: true

    env:
      MACOS_SIGN: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' && 'true' || '' }}
      MACOS_NOTARIZE: ${{ secrets.APPSTORE_API_KEY_BASE64 != '' && 'true' || '' }}
      WINDOWS_SIGN: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && 'true' || '' }}

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libfuse2
          # PyInstaller expects /usr/share/tcltk/tcl8 but Ubuntu 24.04
          # only ships tcl8.6/; create the directory to suppress the warning.
          sudo mkdir -p /usr/share/tcltk/tcl8

      - name: Install dependencies
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install --require-hashes --no-deps -r ../.github/requirements/build-windows.txt
          elif [ "$RUNNER_OS" = "macOS" ]; then
            pip install --require-hashes --no-deps -r ../.github/requirements/build-macos.txt
          else
            pip install --require-hashes --no-deps -r ../.github/requirements/build-linux.txt
          fi
          pip install --no-deps -e .

      # Windows: sequential (Nuitka cache conflicts), Linux: parallel
      - name: Build CLI + GUI
        if: runner.os != 'macOS'
        run: python scripts/build.py all

      # macOS: CLI via PyInstaller, GUI via py2app (unsigned -- signing
      # happens in the merge-macos-universal job after lipo merge)
      - name: Build CLI (macOS)
        if: runner.os == 'macOS'
        run: python scripts/build.py cli

      - name: Build GUI (macOS)
        if: runner.os == 'macOS'
        run: python scripts/build.py mac --no-dmg

      # -- macOS: upload unsigned .app for universal merge ----------------
      # tar preserves symlinks in .framework bundles; upload-artifact does not
      - name: Archive unsigned .app bundle
        if: runner.os == 'macOS'
        run: tar czf dist/Revenant-unsigned.tar.gz -C dist Revenant.app

      - name: Upload unsigned .app bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-unsigned-${{ matrix.platform }}
          path: python/dist/Revenant-unsigned.tar.gz
          if-no-files-found: error

      - name: Upload unsigned CLI binary
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-unsigned-${{ matrix.platform }}
          path: python/dist/revenant
          if-no-files-found: error

      # -- Build AppImage (Linux) ---------------------------------------
      - name: Build AppImage (Linux)
        if: startsWith(matrix.platform, 'linux-')
        run: python scripts/build_appimage.py

      # -- Windows: Authenticode signing --------------------------------
      - name: Import Windows code-signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_SIGN
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $pfxBytes)
        shell: pwsh

      - name: Sign Windows binaries
        if: runner.os == 'Windows' && env.WINDOWS_SIGN
        env:
          SIGN_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $cert = "$env:RUNNER_TEMP\codesign.pfx"
          $ts = "https://timestamp.digicert.com"

          Get-ChildItem -Path dist\revenant-standalone -Filter *.exe | ForEach-Object {
            Write-Host "Signing $($_.Name)..."
            & signtool sign /f $cert /p $env:SIGN_PASSWORD /tr $ts /td sha256 /fd sha256 `
              /d "Revenant Sign" $_.FullName
            & signtool verify /pa $_.FullName
          }
          Write-Host "Windows binaries signed and verified."
        shell: pwsh

      - name: Clean up Windows certificate
        if: runner.os == 'Windows' && env.WINDOWS_SIGN && always()
        run: |
          $cert = "$env:RUNNER_TEMP\codesign.pfx"
          if (Test-Path $cert) {
            Remove-Item $cert
            Write-Host "Certificate cleaned up."
          } else {
            Write-Host "Certificate file not found (already cleaned or never created)."
          }
        shell: pwsh

      # -- Windows: MSIX package (for Microsoft Store) ------------------
      - name: Build MSIX package
        if: matrix.platform == 'windows-x64'
        run: python scripts/build_msix.py

      # -- Package standalone as zip (Windows) ----------------------------
      - name: Package standalone distribution
        if: matrix.standalone
        shell: pwsh
        run: |
          Compress-Archive -Path dist\revenant-standalone\* `
            -DestinationPath dist\revenant-${{ matrix.platform }}.zip
          Write-Host "Created revenant-${{ matrix.platform }}.zip"

      # -- Rename artifacts (Linux/Windows only -- macOS uploaded above) --
      - name: Rename CLI artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          if [ -f "revenant" ]; then
            mv revenant revenant-cli-${{ matrix.platform }}
          fi

      # -- Upload artifacts (Linux/Windows) ------------------------------
      - name: Upload CLI artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.platform }}
          path: python/dist/revenant-cli-${{ matrix.platform }}
          if-no-files-found: error

      - name: Upload standalone artifact (Windows)
        if: matrix.standalone
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standalone-${{ matrix.platform }}
          path: python/dist/revenant-${{ matrix.platform }}.zip
          if-no-files-found: error

      - name: Upload GUI artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gui-${{ matrix.platform }}
          path: python/dist/${{ matrix.gui_artifact }}
          if-no-files-found: error

      - name: Upload MSIX artifact
        if: matrix.platform == 'windows-x64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msix-${{ matrix.platform }}
          path: python/dist/RevenantSign.msix
          if-no-files-found: error

  build-mac:
    name: Build macOS MAS (${{ matrix.arch }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python with Tk 9.0
        uses: ./.github/actions/setup-python-tk
        with:
          cache-key-prefix: pip-mas-${{ matrix.arch }}

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/build-macos.txt
          pip install --no-deps -e .

      - name: Build with py2app
        run: python scripts/build.py mac --no-dmg
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Verify no private API in bundled Tk
        uses: ./.github/actions/verify-no-private-api
        with:
          app-path: python/dist/Revenant.app

      - name: Archive MAS unsigned .app
        run: tar czf dist/Revenant-MAS-unsigned.tar.gz -C dist Revenant.app

      - name: Upload MAS unsigned .app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mas-unsigned-${{ matrix.arch }}
          path: python/dist/Revenant-MAS-unsigned.tar.gz
          if-no-files-found: error

  # -- Merge macOS universal binaries (Developer ID) -------------------
  merge-macos-universal:
    name: Merge macOS Universal (DevID)
    needs: build
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python

    env:
      MACOS_SIGN: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' && 'true' || '' }}
      MACOS_NOTARIZE: ${{ secrets.APPSTORE_API_KEY_BASE64 != '' && 'true' || '' }}

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: brew install create-dmg

      - name: Download arm64 .app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-unsigned-macos-arm64
          path: /tmp/arm64-app

      - name: Download x64 .app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-unsigned-macos-x64
          path: /tmp/x64-app

      - name: Extract .app bundles
        run: |
          tar xzf /tmp/arm64-app/Revenant-unsigned.tar.gz -C /tmp/arm64-app
          tar xzf /tmp/x64-app/Revenant-unsigned.tar.gz -C /tmp/x64-app

      - name: Download arm64 CLI
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-unsigned-macos-arm64
          path: /tmp/arm64-cli

      - name: Download x64 CLI
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-unsigned-macos-x64
          path: /tmp/x64-cli

      - name: Merge universal .app bundle
        run: |
          python scripts/merge_universal.py \
            /tmp/arm64-app/Revenant.app \
            /tmp/x64-app/Revenant.app \
            dist/Revenant.app

      - name: Merge universal CLI binary
        run: |
          mkdir -p dist
          python scripts/merge_universal.py --cli \
            /tmp/arm64-cli/revenant \
            /tmp/x64-cli/revenant \
            dist/revenant

      # -- Codesign universal binaries -----------------------------------
      - name: Import code-signing certificate
        if: env.MACOS_SIGN
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Codesign .app bundle
        if: env.MACOS_SIGN
        run: |
          IDENTITY="Developer ID Application: ${{ secrets.APPLE_IDENTITY }}"

          find "dist/Revenant.app/Contents" \
            \( -name '*.dylib' -o -name '*.so' -o -name '*.o' \) \
            -exec codesign --force --timestamp --options runtime \
              --sign "$IDENTITY" {} \;

          find "dist/Revenant.app/Contents/Frameworks" \
            -type f ! -name '*.*' | while read -r bin; do
            if file "$bin" | grep -q "Mach-O"; then
              echo "  signing framework binary: $bin"
              codesign --force --timestamp --options runtime \
                --sign "$IDENTITY" "$bin"
            fi
          done

          if [ -f "dist/Revenant.app/Contents/MacOS/python" ]; then
            codesign --force --timestamp --options runtime \
              --entitlements entitlements.plist \
              --sign "$IDENTITY" \
              "dist/Revenant.app/Contents/MacOS/python"
          fi

          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$IDENTITY" \
            "dist/Revenant.app/Contents/MacOS/Revenant"

          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" \
            "dist/Revenant.app"

          codesign --verify --deep --strict "dist/Revenant.app"
          echo "Code signature verified."

      - name: Codesign CLI binary
        if: env.MACOS_SIGN
        run: |
          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application: ${{ secrets.APPLE_IDENTITY }}" \
            dist/revenant
          codesign --verify --strict dist/revenant

      # -- Create and sign DMG -------------------------------------------
      - name: Create DMG
        run: python scripts/build.py dmg

      - name: Codesign DMG
        if: env.MACOS_SIGN
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application: ${{ secrets.APPLE_IDENTITY }}" \
            dist/Revenant.dmg
          codesign --verify --strict dist/Revenant.dmg
          echo "DMG code signature verified."

      # -- Notarize -------------------------------------------------------
      - name: Decode App Store Connect API key
        if: env.MACOS_NOTARIZE
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Notarize DMG
        if: env.MACOS_NOTARIZE
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          SUBMIT_EXIT=0
          SUBMIT_OUT=$(xcrun notarytool submit dist/Revenant.dmg \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait 2>&1) || SUBMIT_EXIT=$?
          echo "$SUBMIT_OUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep '  id:' | head -1 | awk '{print $2}')

          if [ "$SUBMIT_EXIT" -ne 0 ] && ! echo "$SUBMIT_OUT" | grep -q "status: Accepted"; then
            echo "::error::Notarization failed. Fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              developer_log.json
            cat developer_log.json
            exit 1
          fi

          xcrun stapler staple dist/Revenant.dmg
          echo "DMG notarized and stapled."

      - name: Notarize CLI binary
        if: env.MACOS_NOTARIZE
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          ditto -c -k --keepParent dist/revenant dist/revenant-cli.zip

          xcrun notarytool submit dist/revenant-cli.zip \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          rm dist/revenant-cli.zip
          echo "CLI binary notarized."

      - name: Clean up signing keys
        if: env.MACOS_NOTARIZE && always()
        run: rm -rf ~/private_keys

      # -- Rename and upload final artifacts ------------------------------
      - name: Rename artifacts
        run: |
          cd dist
          mv revenant revenant-cli-macos-universal
          mv Revenant.dmg Revenant-gui-macos-universal.dmg

      - name: Upload CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-macos-universal
          path: python/dist/revenant-cli-macos-universal
          if-no-files-found: error

      - name: Upload GUI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gui-macos-universal
          path: python/dist/Revenant-gui-macos-universal.dmg
          if-no-files-found: error

  # -- Merge macOS universal binaries (MAS) ----------------------------
  merge-macos-mas:
    name: Merge macOS Universal (MAS)
    needs: build-mac
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python

    env:
      MAS_SIGN: ${{ secrets.MAS_CERTIFICATE_BASE64 != '' && 'true' || '' }}

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download arm64 MAS .app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mas-unsigned-arm64
          path: /tmp/arm64-app

      - name: Download x64 MAS .app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mas-unsigned-x86_64
          path: /tmp/x64-app

      - name: Extract .app bundles
        run: |
          tar xzf /tmp/arm64-app/Revenant-MAS-unsigned.tar.gz -C /tmp/arm64-app
          tar xzf /tmp/x64-app/Revenant-MAS-unsigned.tar.gz -C /tmp/x64-app

      - name: Merge universal .app bundle
        run: |
          mkdir -p dist
          python scripts/merge_universal.py \
            /tmp/arm64-app/Revenant.app \
            /tmp/x64-app/Revenant.app \
            dist/Revenant.app

      - name: Import MAS signing certificate
        if: env.MAS_SIGN
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6
        with:
          p12-file-base64: ${{ secrets.MAS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MAS_CERTIFICATE_PASSWORD }}

      # -- Embed provisioning profile ----------------------------------
      - name: Embed provisioning profile
        if: env.MAS_SIGN
        run: |
          echo "${{ secrets.MAS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
            > dist/Revenant.app/Contents/embedded.provisionprofile
          echo "Embedded provisioning profile ($(wc -c < dist/Revenant.app/Contents/embedded.provisionprofile) bytes)"

      # -- Codesign for MAS --------------------------------------------
      - name: Codesign .app bundle (MAS)
        if: env.MAS_SIGN
        run: |
          IDENTITY="3rd Party Mac Developer Application: ${{ secrets.APPLE_IDENTITY }}"

          find "dist/Revenant.app/Contents" \
            \( -name '*.dylib' -o -name '*.so' -o -name '*.o' \) \
            -exec codesign --force --timestamp --options runtime \
              --sign "$IDENTITY" {} \;

          find "dist/Revenant.app/Contents/Frameworks" \
            -type f ! -name '*.*' | while read -r bin; do
            if file "$bin" | grep -q "Mach-O"; then
              echo "  signing framework binary: $bin"
              codesign --force --timestamp --options runtime \
                --entitlements entitlements-sandbox-nested.plist \
                --sign "$IDENTITY" "$bin"
            fi
          done

          if [ -f "dist/Revenant.app/Contents/MacOS/python" ]; then
            codesign --force --timestamp --options runtime \
              --entitlements entitlements-sandbox-nested.plist \
              --sign "$IDENTITY" \
              "dist/Revenant.app/Contents/MacOS/python"
          fi

          codesign --force --timestamp --options runtime \
            --entitlements entitlements-sandbox.plist \
            --sign "$IDENTITY" \
            "dist/Revenant.app/Contents/MacOS/Revenant"

          codesign --force --timestamp --options runtime \
            --entitlements entitlements-sandbox.plist \
            --sign "$IDENTITY" \
            "dist/Revenant.app"

          codesign --verify --deep --strict "dist/Revenant.app"
          echo "MAS code signature verified."

      # -- Package as .pkg for MAS submission ---------------------------
      - name: Create installer .pkg
        if: env.MAS_SIGN
        run: |
          INSTALLER_IDENTITY="3rd Party Mac Developer Installer: ${{ secrets.APPLE_IDENTITY }}"
          productbuild --component "dist/Revenant.app" /Applications \
            --sign "$INSTALLER_IDENTITY" \
            dist/Revenant-MAS.pkg

      - name: Upload MAS artifact
        if: env.MAS_SIGN
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mas-macos-universal
          path: python/dist/Revenant-MAS.pkg
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, merge-macos-universal, merge-macos-mas]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      # Remove intermediate unsigned artifacts (uploaded for the merge jobs
      # but not intended for the GitHub Release)
      - name: Clean up intermediate artifacts
        run: |
          cd artifacts
          rm -rf Revenant.app revenant
          ls -la

      - name: Package screenshots
        run: |
          cd artifacts
          for dir in en hy ru store; do
            if [ -d "$dir" ]; then
              zip -r screenshots.zip "$dir"
            fi
          done
          # Clean up raw directories so they don't interfere with release upload
          rm -rf en hy ru store

      - name: Generate checksums
        run: |
          cd artifacts
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "artifacts/*"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: python/
          format: spdx-json
          output-file: artifacts/revenant-sbom.spdx.json

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: release
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Convert semver pre-release to PEP 440: 0.1.0-rc.1 -> 0.1.0rc1, 0.1.0-alpha.1 -> 0.1.0a1
          VERSION=$(echo "$TAG" | sed -E 's/-alpha\./a/; s/-beta\./b/; s/-rc\./rc/')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r .github/requirements/build.txt

      - name: Build sdist and wheel
        run: python -m build python/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: python/dist/
          attestations: true

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r .github/requirements/build.txt

      - name: Build sdist and wheel
        run: python -m build python/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: python/dist/
          attestations: true
          skip-existing: true

  publish-npm:
    name: Publish to npm
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: |
          PKG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "revenant-sign@$PKG_VERSION" version 2>/dev/null; then
            echo "Version $PKG_VERSION already published, skipping"
          else
            pnpm publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-prerelease:
    name: Publish to npm (pre-release)
    needs: release
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Convert semver pre-release: 0.2.5-alpha.1 -> 0.2.5-alpha.1 (npm supports semver natively)
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --no-git-checks --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download macOS universal CLI binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "revenant-cli-macos-universal" \
            --dir .

      - name: Update formula in tap repository
        env:
          GH_TOKEN: ${{ secrets.DIST_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum revenant-cli-macos-universal | awk '{print $1}')
          FILE_SHA=$(gh api repos/lobotomoe/homebrew-revenant/contents/Formula/revenant.rb --jq '.sha')

          cat > /tmp/revenant.rb << RUBY
          class Revenant < Formula
            desc "Electronic document signing with ARX CoSign (SOAP/DSS)"
            homepage "https://github.com/lobotomoe/revenant"
            license "Apache-2.0"
            version "$VERSION"

            url "https://github.com/lobotomoe/revenant/releases/download/v#{version}/revenant-cli-macos-universal"
            sha256 "$SHA256"

            depends_on :macos

            def install
              bin.install "revenant-cli-macos-universal" => "revenant"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/revenant --version")
            end
          end
          RUBY

          CONTENT=$(base64 -w 0 /tmp/revenant.rb)
          gh api repos/lobotomoe/homebrew-revenant/contents/Formula/revenant.rb \
            --method PUT \
            --field message="revenant $VERSION" \
            --field content="$CONTENT" \
            --field sha="$FILE_SHA"

  update-scoop:
    name: Update Scoop Bucket
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download Windows ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "revenant-windows-x64.zip" \
            --dir .

      - name: Update manifest in bucket repository
        env:
          GH_TOKEN: ${{ secrets.DIST_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum revenant-windows-x64.zip | awk '{print $1}')
          FILE_SHA=$(gh api repos/lobotomoe/scoop-revenant/contents/bucket/revenant.json --jq '.sha')

          cat > /tmp/revenant.json << 'MANIFEST'
          {
              "version": "VERSION_PLACEHOLDER",
              "description": "Electronic document signing with ARX CoSign (SOAP/DSS)",
              "homepage": "https://github.com/lobotomoe/revenant",
              "license": "Apache-2.0",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/lobotomoe/revenant/releases/download/vVERSION_PLACEHOLDER/revenant-windows-x64.zip",
                      "hash": "HASH_PLACEHOLDER"
                  }
              },
              "bin": [
                  "revenant.exe",
                  "revenant-gui.exe"
              ],
              "shortcuts": [
                  [
                      "revenant-gui.exe",
                      "Revenant Sign"
                  ]
              ],
              "checkver": {
                  "github": "https://github.com/lobotomoe/revenant"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/lobotomoe/revenant/releases/download/v$version/revenant-windows-x64.zip"
                      }
                  }
              }
          }
          MANIFEST

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" /tmp/revenant.json
          sed -i "s/HASH_PLACEHOLDER/$SHA256/g" /tmp/revenant.json

          CONTENT=$(base64 -w 0 /tmp/revenant.json)
          gh api repos/lobotomoe/scoop-revenant/contents/bucket/revenant.json \
            --method PUT \
            --field message="revenant $VERSION" \
            --field content="$CONTENT" \
            --field sha="$FILE_SHA"
