name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      skip-build-test:
        description: "Skip build-test jobs (caller does its own builds)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install ruff
        run: pip install --require-hashes --no-deps -r ../.github/requirements/lint.txt

      - name: Check formatting
        run: ruff format --check src/ tests/ scripts/

      - name: Lint
        run: ruff check src/ tests/ scripts/

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d # v1

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Install pip-audit
        run: pip install --require-hashes --no-deps -r ../.github/requirements/audit.txt

      - name: Run pip-audit
        run: |
          # CVE-2024-23342: timing attack in ecdsa (dep of tlslite-ng).
          # No fix available as of 2026-02 -- ecdsa maintainers consider side-channel
          # attacks out of scope for pure-Python implementation.
          # Tracking: https://github.com/tlsfuzzer/python-ecdsa/issues/339
          # Re-evaluate: when ecdsa > 0.19.1 is released or tlslite-ng drops ecdsa dep.
          # Last checked: 2026-02-12
          pip-audit --skip-editable --ignore-vuln CVE-2024-23342

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: moderate
          allow-licenses: >-
            Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, PSF-2.0,
            MPL-2.0, LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only,
            0BSD, Unlicense, CC0-1.0, Zlib, GPL-2.0, GPL-2.0-only,
            WTFPL, BlueOak-1.0.0

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Run pyright
        run: pyright src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Compile translations
        run: python scripts/compile_translations.py

      - name: Run tests
        run: pytest -v --junitxml=junit.xml

      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        with:
          paths: python/junit.xml
        if: always()

      - name: Coverage Summary
        if: matrix.python-version == '3.13' && always()
        run: |
          echo '## Coverage Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

  # -- TypeScript ---------------------------------------------------------------

  ts-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  ts-test:
    name: TypeScript Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: typescript

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "22"]

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  ts-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test CLI binary
        run: node dist/cli.js --help

  # -- Manifests & packaging ---------------------------------------------------

  validate-manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate MSIX identity
        run: |
          # Verify AppxManifest.xml has the real Partner Center identity (not a placeholder)
          if ! grep -q 'Publisher="CN=' python/msix/AppxManifest.xml; then
            echo "::error::MSIX AppxManifest.xml is missing Publisher identity"
            exit 1
          fi
          if grep -q 'CN=PLACEHOLDER' python/msix/AppxManifest.xml; then
            echo "::error::MSIX AppxManifest.xml still contains CN=PLACEHOLDER"
            exit 1
          fi

      - name: Check Flatpak null commits
        run: |
          # The in-repo manifest is a reference template. The actual Flathub
          # submission uses a separate repo (flathub/io.github.lobotomoe.revenant)
          # where the commit hash is filled in after tagging. Warn but don't block.
          if grep -q 'commit: null' python/flatpak/io.github.lobotomoe.revenant.yml; then
            echo "::warning::Flatpak manifest has null commit hashes -- update the Flathub repo after tagging"
          fi

      - name: Check invalid SHA256 hashes
        run: |
          # Extract sha256 values and verify they're valid hex (or all zeros for TODO placeholders)
          hashes=$(grep -oP 'sha256:\s*\K[^\s]+' python/flatpak/io.github.lobotomoe.revenant.yml || true)
          for hash in $hashes; do
            if ! echo "$hash" | grep -qP '^[0-9a-f]{64}$'; then
              echo "::error::Invalid SHA256 hash in Flatpak manifest: $hash"
              exit 1
            fi
          done
          echo "All SHA256 hashes are valid hex"

  package:
    name: Package (sdist + wheel)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r .github/requirements/build.txt

      - name: Build sdist and wheel
        run: python -m build python/

      - name: Verify wheel contents
        run: |
          pip install python/dist/*.whl
          python -c "import revenant; print(revenant.__version__)"

  build-test:
    name: Build Test
    if: ${{ !inputs.skip-build-test }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-python-tk
        with:
          cache-key-prefix: pip-build-test-mac

      # Linux/Windows: standard setup-python
      - name: Set up Python
        if: runner.os != 'macOS'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install --require-hashes --no-deps -r ../.github/requirements/build-windows.txt
          elif [ "$RUNNER_OS" = "macOS" ]; then
            pip install --require-hashes --no-deps -r ../.github/requirements/build-macos.txt
          else
            pip install --require-hashes --no-deps -r ../.github/requirements/build-linux.txt
          fi
          pip install --no-deps -e .

      # CLI + GUI on Linux/Windows
      - name: Build CLI + GUI
        if: runner.os != 'macOS'
        run: python scripts/build.py all

      # macOS: CLI via PyInstaller, GUI via py2app (different toolchains)
      - name: Build CLI (macOS)
        if: runner.os == 'macOS'
        run: python scripts/build.py cli

      - name: Build GUI (macOS)
        if: runner.os == 'macOS'
        run: python scripts/build.py mac --no-dmg

      - name: Patch private API symbols in bundled Tk (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/patch-tk-private-api
        with:
          app-path: python/dist/Revenant.app

      - name: Verify no private API in bundled Tk (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/verify-no-private-api
        with:
          app-path: python/dist/Revenant.app

      - name: Test CLI binary (Unix)
        if: runner.os != 'Windows'
        run: ./dist/revenant --help

      - name: Test CLI binary (Windows)
        if: runner.os == 'Windows'
        run: ./dist/revenant-standalone/revenant.exe --help

  # -- Screenshot gallery -------------------------------------------------------

  screenshots:
    name: Screenshots (${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # No harden-runner here -- it shows a macOS network dialog that overlays screenshots
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-python-tk
        with:
          cache-key-prefix: pip-screenshots-mac

      - name: Set up Python
        if: runner.os != 'macOS'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Install Quartz bridge (macOS native window capture)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-Quartz

      - name: Compile translations
        run: python scripts/compile_translations.py

      - name: Generate screenshots (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a python scripts/screenshot_gallery.py ../screenshots --background ../docs/store/bg.jpg

      - name: Generate screenshots (macOS/Windows)
        if: runner.os != 'Linux'
        run: python scripts/screenshot_gallery.py ../screenshots --background ../docs/store/bg.jpg

      - name: Upload screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: screenshots-${{ matrix.os }}
          path: screenshots.zip
        if: always()
