name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      skip-build-test:
        description: "Skip build-test jobs (caller does its own builds)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install ruff
        run: pip install --require-hashes --no-deps -r ../.github/requirements/lint.txt

      - name: Check formatting
        run: ruff format --check src/ tests/ scripts/

      - name: Lint
        run: ruff check src/ tests/ scripts/

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Install pip-audit
        run: pip install --require-hashes --no-deps -r ../.github/requirements/audit.txt

      - name: Run pip-audit
        run: |
          # CVE-2024-23342: timing attack in ecdsa (dep of tlslite-ng).
          # No fix available -- ecdsa maintainers consider side-channel attacks
          # out of scope for the pure-Python implementation. 0.19.2 (latest) still
          # ships the vulnerable code.
          # Tracking: https://github.com/tlsfuzzer/python-ecdsa/issues/339
          # Re-evaluate: when a side-channel-hardened ecdsa lands or tlslite-ng drops the dep.
          # Last checked: 2026-07-17
          pip-audit --skip-editable --ignore-vuln CVE-2024-23342

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: moderate
          allow-licenses: >-
            Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, PSF-2.0,
            MPL-2.0, LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only,
            0BSD, Unlicense, CC0-1.0, Zlib, GPL-2.0, GPL-2.0-only,
            WTFPL, BlueOak-1.0.0, Unicode-3.0, CDLA-Permissive-2.0
          # These crates declare dual Apache-2.0/MIT with the old `/` separator,
          # which is not valid SPDX, so the scanner tags the license as "bad".
          # dbus/libdbus-sys are the Linux keyring backend; unicode-properties and
          # stringprep come in via lopdf's PDF-encryption (SASLprep) path; all fine.
          allow-dependencies-licenses: >-
            pkg:cargo/dbus, pkg:cargo/libdbus-sys, pkg:cargo/rangemap,
            pkg:cargo/unicode-properties, pkg:cargo/stringprep

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Run pyright
        run: pyright src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Compile translations
        run: python scripts/compile_translations.py

      - name: Run tests
        run: pytest -v --junitxml=junit.xml

      - name: Test Summary
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: always()
        with:
          report_paths: python/junit.xml
          detailed_summary: true
          annotate_only: true

      - name: Coverage Summary
        if: matrix.python-version == '3.13' && always()
        run: |
          echo '## Coverage Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

  # -- TypeScript ---------------------------------------------------------------

  ts-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  ts-test:
    name: TypeScript Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: typescript

    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.33.4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  ts-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test CLI binary
        run: node dist/cli.js --help

  # -- Rust ---------------------------------------------------------------------

  rs-lint:
    name: Rust Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      # The keyring Secret Service backend (dbus-secret-service -> libdbus-sys)
      # links the system libdbus at build time; clippy --all-targets compiles it.
      - name: Install libdbus (keyring Secret Service backend)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

  rs-test:
    name: Rust Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install libdbus (Linux keyring backend)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Run tests
        run: cargo test --workspace

  rs-msrv:
    name: Rust MSRV (1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install libdbus (keyring Secret Service backend)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust 1.85 (workspace MSRV)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      # Verifies the documented MSRV (rust-version = "1.85") still compiles the
      # committed Cargo.lock -- a newer-stdlib slip or a dep MSRV bump fails here.
      - name: Check (MSRV)
        run: cargo check --workspace --all-targets

  rs-build:
    name: Rust Build
    if: ${{ !inputs.skip-build-test }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install libdbus (keyring Secret Service backend)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Test CLI binary
        run: ./target/release/revenant --help

  # -- Manifests & packaging ---------------------------------------------------

  validate-manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Validate MSIX identity
        run: |
          # Verify the active (Rust) AppxManifest has the real Partner Center
          # identity (not a placeholder). The Python manifest is preserved under
          # python/msix/ but no longer the shipped one.
          if ! grep -q 'Publisher="CN=' rust/packaging/windows/AppxManifest.xml; then
            echo "::error::MSIX AppxManifest.xml is missing Publisher identity"
            exit 1
          fi
          if grep -q 'CN=PLACEHOLDER' rust/packaging/windows/AppxManifest.xml; then
            echo "::error::MSIX AppxManifest.xml still contains CN=PLACEHOLDER"
            exit 1
          fi

      - name: Check Flatpak null commits
        run: |
          # The in-repo manifest is a reference template. The actual Flathub
          # submission uses a separate repo (flathub/io.github.lobotomoe.revenant)
          # where the commit hash is filled in after tagging. Warn but don't block.
          if grep -q 'commit: null' rust/packaging/linux/io.github.lobotomoe.revenant.yml; then
            echo "::warning::Flatpak manifest has null commit hashes -- update the Flathub repo after tagging"
          fi

      - name: Check invalid SHA256 hashes
        run: |
          # Extract sha256 values and verify they're valid hex (or all zeros for TODO placeholders)
          hashes=$(grep -oP 'sha256:\s*\K[^\s]+' rust/packaging/linux/io.github.lobotomoe.revenant.yml || true)
          for hash in $hashes; do
            if ! echo "$hash" | grep -qP '^[0-9a-f]{64}$'; then
              echo "::error::Invalid SHA256 hash in Flatpak manifest: $hash"
              exit 1
            fi
          done
          echo "All SHA256 hashes are valid hex"

  package:
    name: Package (sdist + wheel)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r .github/requirements/build.txt

      - name: Build sdist and wheel
        run: python -m build python/

      - name: Verify wheel contents
        run: |
          pip install python/dist/*.whl
          python -c "import revenant; print(revenant.__version__)"

  build-test:
    name: Build Test
    if: ${{ !inputs.skip-build-test }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-python-tk
        with:
          cache-key-prefix: pip-build-test-mac

      # Linux/Windows: standard setup-python
      - name: Set up Python
        if: runner.os != 'macOS'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install --require-hashes --no-deps -r ../.github/requirements/build-windows.txt
          elif [ "$RUNNER_OS" = "macOS" ]; then
            pip install --require-hashes --no-deps -r ../.github/requirements/build-macos.txt
          else
            pip install --require-hashes --no-deps -r ../.github/requirements/build-linux.txt
          fi
          pip install --no-deps -e .

      # CLI + GUI on Linux/Windows
      - name: Build CLI + GUI
        if: runner.os != 'macOS'
        run: python scripts/build.py all

      # macOS: CLI via PyInstaller, GUI via py2app (different toolchains)
      - name: Build CLI (macOS)
        if: runner.os == 'macOS'
        run: python scripts/build.py cli

      - name: Build GUI (macOS)
        if: runner.os == 'macOS'
        run: python scripts/build.py mac --no-dmg

      - name: Patch private API symbols in bundled Tk (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/patch-tk-private-api
        with:
          app-path: python/dist/Revenant.app

      - name: Verify no private API in bundled Tk (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/verify-no-private-api
        with:
          app-path: python/dist/Revenant.app

      - name: Test CLI binary (Unix)
        if: runner.os != 'Windows'
        run: ./dist/revenant --help

      - name: Test CLI binary (Windows)
        if: runner.os == 'Windows'
        run: ./dist/revenant-standalone/revenant.exe --help

  # -- Screenshot gallery -------------------------------------------------------

  screenshots:
    name: Screenshots (${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # No harden-runner here -- it shows a macOS network dialog that overlays screenshots
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-python-tk
        with:
          cache-key-prefix: pip-screenshots-mac

      - name: Set up Python
        if: runner.os != 'macOS'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb openbox

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r ../.github/requirements/dev.txt
          pip install --no-deps -e .

      - name: Install Quartz bridge (macOS native window capture)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-Quartz

      - name: Compile translations
        run: python scripts/compile_translations.py

      - name: Generate screenshots (Linux)
        if: runner.os == 'Linux'
        run: |
          # Start Xvfb + openbox WM so windows have native Linux decorations
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          openbox &
          sleep 1
          python scripts/screenshot_gallery.py ../screenshots --background ../docs/store/bg.jpg

      - name: Generate screenshots (macOS/Windows)
        if: runner.os != 'Linux'
        run: python scripts/screenshot_gallery.py ../screenshots --background ../docs/store/bg.jpg

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshots-${{ matrix.os }}
          path: screenshots/
        if: always()
