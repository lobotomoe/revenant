name: Build Tk from source (private API fix)
description: >
  Download the Tk 9.0.x source tarball (same as Homebrew uses) at the installed
  tcl-tk version, remove the NSWindowDidOrderOnScreenNotification and
  NSWindowWillOrderOnScreenNotification references from tkMacOSXWindowEvent.c,
  build the patched dylib, and replace the Homebrew libtcl9tk9.0.dylib before
  py2app bundles it.

  These are private macOS APIs that trigger MAS rejection (Guideline 2.5.1).
  The fix (moving the code to #if 0) is merged in Tk main but not backported
  to the 9.0.x release branch.
  Upstream: https://core.tcl-lang.org/tk/tktview/a9969f7ffd966229c4e6

  The patched dylib is cached by tcl-tk version so subsequent CI runs are fast.

inputs:
  cache-key-prefix:
    description: Prefix for the Tk build cache key
    required: false
    default: patched-tk
  arch:
    description: Target architecture (arm64 or x86_64). Defaults to runner native arch.
    required: false
    default: ""
  brew-path:
    description: Path to brew binary (e.g. /usr/local/bin/brew for x86_64 Rosetta builds).
    required: false
    default: brew

runs:
  using: composite
  steps:
    - name: Detect target architecture
      id: arch
      shell: bash
      run: |
        ARCH="${{ inputs.arch }}"
        if [ -z "$ARCH" ]; then
          ARCH="$(uname -m)"
        fi
        echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
        echo "Target architecture: ${ARCH}"

    - name: Get tcl-tk version
      id: version
      shell: bash
      run: |
        BREW="${{ inputs.brew-path }}"
        TK_VER=$($BREW info --json=v1 tcl-tk | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        print(data[0]['installed'][0]['version'])
        ")
        echo "tk_version=${TK_VER}" >> "$GITHUB_OUTPUT"
        echo "Detected tcl-tk version: ${TK_VER}"

    - name: Cache patched Tk dylib
      id: cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: /tmp/patched-tk
        key: ${{ inputs.cache-key-prefix }}-${{ steps.version.outputs.tk_version }}-${{ steps.arch.outputs.arch }}

    - name: Download Tk source tarball
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        TK_VER="${{ steps.version.outputs.tk_version }}"
        TARBALL_URL="https://prdownloads.sourceforge.net/tcl/tk${TK_VER}-src.tar.gz"
        echo "Downloading Tk ${TK_VER} source from ${TARBALL_URL}"
        rm -rf /tmp/tk-src /tmp/tk-src.tar.gz
        curl -fsSL "${TARBALL_URL}" -o /tmp/tk-src.tar.gz
        tar xzf /tmp/tk-src.tar.gz -C /tmp/
        mv "/tmp/tk${TK_VER}" /tmp/tk-src
        rm /tmp/tk-src.tar.gz
        echo "Extracted to /tmp/tk-src"

    - name: Patch private API references
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        FILE="/tmp/tk-src/macosx/tkMacOSXWindowEvent.c"

        # Remove extern declarations (lines 37-38 in 9.0.3) and the two
        # observe() calls (lines 446-447 in 9.0.3) that register for these
        # private notifications.  The same change is already in Tk main
        # (moved behind #if 0); we apply it to the release branch.
        sed -i '' \
          '/NSWindowWillOrderOnScreenNotification/d;/NSWindowDidOrderOnScreenNotification/d' \
          "${FILE}"

        if grep -q 'NSWindowDidOrderOnScreenNotification\|NSWindowWillOrderOnScreenNotification' \
             "${FILE}"; then
          echo "ERROR: private API references still present after patch" >&2
          grep -n 'NSWindowOrderOnScreen' "${FILE}" >&2
          exit 1
        fi
        echo "Patch applied — 0 private API references remain in $(basename "${FILE}")"

    - name: Build patched Tk
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        BREW="${{ inputs.brew-path }}"
        BREW_TCL="$($BREW --prefix tcl-tk)"
        TARGET_ARCH="${{ steps.arch.outputs.arch }}"

        # tclConfig.sh from a Homebrew bottle embeds the architecture it
        # was built with (e.g. -arch arm64).  When cross-building for a
        # different arch via Rosetta, Tk's configure inherits those flags
        # and the linker tries to produce a fat binary it cannot satisfy.
        # Fix: replace any wrong -arch flags in the Tcl config.
        TCL_CONFIG="${BREW_TCL}/lib/tclConfig.sh"
        if [ "$TARGET_ARCH" = "x86_64" ]; then
          sed -i '' "s/-arch arm64/-arch x86_64/g" "$TCL_CONFIG"
          echo "Patched tclConfig.sh: replaced -arch arm64 with -arch x86_64"
        elif [ "$TARGET_ARCH" = "arm64" ]; then
          sed -i '' "s/-arch x86_64/-arch arm64/g" "$TCL_CONFIG"
          echo "Patched tclConfig.sh: replaced -arch x86_64 with -arch arm64"
        fi

        rm -rf /tmp/tk-build
        mkdir /tmp/tk-build
        cd /tmp/tk-build

        # Use the same configure flags as the Homebrew tcl-tk formula.
        # Tk's configure script lives in unix/ (not the source root).
        # --with-tcl points to the already-installed Homebrew Tcl so we
        # only need to rebuild the Tk dylib, not Tcl itself.
        #
        # CPPFLAGS: tclConfig.sh from a Homebrew bottle contains hardcoded
        # include paths from the Homebrew build server (/private/tmp/tcl-tk-*/),
        # which do not exist on this runner. Without an explicit -I the compiler
        # falls back to the Xcode SDK tcl.h (Tcl 8.6) and fails with
        # "Tk 9.0 must be compiled with tcl.h from Tcl 9.0 or better".
        /tmp/tk-src/unix/configure \
          --prefix="${BREW_TCL}" \
          --includedir="${BREW_TCL}/include/tcl-tk" \
          --disable-zipfs \
          --enable-man-suffix \
          --enable-64bit \
          --enable-aqua=yes \
          --without-x \
          --with-tcl="${BREW_TCL}/lib" \
          CPPFLAGS="-I${BREW_TCL}/include/tcl-tk" \
          CFLAGS="-arch ${{ steps.arch.outputs.arch }} -mmacosx-version-min=12.0 -O2" \
          LDFLAGS="-arch ${{ steps.arch.outputs.arch }} -L$($BREW --prefix libtommath)/lib"

        make -j"$(sysctl -n hw.ncpu)"

        # The Tk build produces libtcl9tk9.0.dylib (TK_LIB_FILE in tkConfig.sh)
        DYLIB=$(find . -maxdepth 2 -name "libtcl*tk*.dylib" | head -1)
        if [ -z "${DYLIB}" ]; then
          echo "ERROR: Tk dylib not found after build" >&2
          find . -name "*.dylib" >&2
          exit 1
        fi
        echo "Built: ${DYLIB}"

        # The install ID must match the Homebrew path so that py2app's
        # install_name_tool pass recognises and relocates it correctly.
        BREW_ID="${BREW_TCL}/lib/$(basename "${DYLIB}")"
        install_name_tool -id "${BREW_ID}" "${DYLIB}"

        mkdir -p /tmp/patched-tk
        cp "${DYLIB}" /tmp/patched-tk/
        echo "Cached to /tmp/patched-tk/$(basename "${DYLIB}")"

    - name: Install patched Tk dylib
      shell: bash
      run: |
        set -euo pipefail
        BREW="${{ inputs.brew-path }}"
        BREW_TCL="$($BREW --prefix tcl-tk)"
        PATCHED=$(ls /tmp/patched-tk/libtcl*tk*.dylib 2>/dev/null | head -1)
        if [ -z "${PATCHED}" ]; then
          echo "ERROR: patched dylib not found in /tmp/patched-tk/" >&2
          exit 1
        fi
        TARGET="${BREW_TCL}/lib/$(basename "${PATCHED}")"
        echo "Installing ${PATCHED} → ${TARGET}"
        sudo cp "${PATCHED}" "${TARGET}"
        echo "Installed patched $(basename "${TARGET}")"

        # Sanity-check: verify no private API remains in the installed dylib
        if nm -u "${TARGET}" 2>/dev/null | \
             grep -q 'NSWindow.*OrderO.*ScreenNotification'; then
          echo "ERROR: private API symbols still present in installed dylib" >&2
          exit 1
        fi
        echo "Verified: no private API symbols in installed dylib"
