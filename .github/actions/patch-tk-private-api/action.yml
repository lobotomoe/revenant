name: Patch private API symbols in bundled Tk
description: >
  DEPRECATED — no longer needed.  Private API symbols are now removed at
  build time by the build-patched-tk action, which compiles Tk from source
  with the NSWindowDidOrderOnScreenNotification /
  NSWindowWillOrderOnScreenNotification references deleted before the dylib
  is built.  This action is retained as a no-op so that any workflow steps
  that still reference it do not break.
  Upstream: https://core.tcl-lang.org/tk/tktview/a9969f7ffd966229c4e6

inputs:
  app-path:
    description: Path to the .app bundle (unused)
    required: false
    default: dist/Revenant.app

runs:
  using: composite
  steps:
    - name: No-op (private API already removed at build time)
      shell: bash
      run: |
        echo "patch-tk-private-api: no-op — Tk dylib was built without private API symbols."
